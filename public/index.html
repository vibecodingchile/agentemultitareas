CONTRATOS (${d.contratos.length}):
${d.contratos.map(c=>`- ${c.id}: ${c.proveedor} | ${c.tipo} | ${fmtCLP(c.monto)} | ${c.estado} | Art22:OK`).join("\n")}

HITOS (${d.hitos.length} total, ${hitosOk} completados):
${d.hitos.map(h=>`- ${h.id} ${h.proyecto}: "${h.nombre}" | ${h.estado} | ${h.fecha}`).join("\n")}

TIPO INFORME: ${typeName}
INSTRUCCIONES: Usa ## para secciones, ### para subsecciones. Incluye Resumen Ejecutivo, análisis detallado, conclusiones y recomendaciones. Cita siempre el marco legal. Usa lenguaje formal institucional chileno. Señala alertas y riesgos claramente.`;
}

function Toast({msg,onClose}) {
  useEffect(()=>{const t=setTimeout(onClose,3200);return()=>clearTimeout(t);},[]);
  return <div className="toast"><span>✓</span><span>{msg}</span></div>;
}

    <div className="msg">
      <div className="msg-av agent">🤖</div>
      <div className="msg-body">

          <span className="msg-tag">Redactando informe…</span>

        <div className="thinking"><span/><span/><span/></div>
      </div>
    </div>
  );
}

function MsgText({text}) {
  const lines = text.split("\n");
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const l = lines[i];
    if (l.startsWith("## ")) { out.push(<h2 key={i}>{l.slice(3)}</h2>); }
    else if (l.startsWith("### ")) { out.push(<h3 key={i}>{l.slice(4)}</h3>); }
    else if (l.startsWith("- ") || l.startsWith("• ")) {
      const items = [];
      while (i < lines.length && (lines[i].startsWith("- ")||lines[i].startsWith("• "))) {
        items.push(<li key={i}>{lines[i].slice(2)}</li>);
        i++;
      }
      out.push(<ul key={"ul"+i}>{items}</ul>);
      continue;
    } else if (l.trim()==="") { out.push(<br key={i}/>); }
    else {
      const html = l.replace(/\*\*(.*?)\*\*/g,(_,t)=>`<strong>${t}</strong>`);
      out.push(<p key={i} dangerouslySetInnerHTML={{__html:html}}/>);
    }
    i++;
  }
  return <div className="msg-text">{out}</div>;
}

function App() {

    time: nowTime(),
  }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [progress, setProgress] = useState(0);
  const [toast, setToast] = useState(null);
  const chatRef = useRef(null);
  const taRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, loading]);

  // Hide loading screen when React mounts
  useEffect(() => {
    const el = document.getElementById("loading");
    if (el) { el.style.opacity = "0"; setTimeout(()=>el.remove(), 400); }
  }, []);

  const send = useCallback(async (text) => {
    if (!text.trim() || loading) return;
    const userMsg = text.trim();
    setInput("");
    setMessages(prev => [...prev, {role:"user", content:userMsg, time:nowTime()}]);
    setLoading(true);
    setProgress(0);

    let p = 0;
    const timer = setInterval(()=>{ p=Math.min(p+Math.random()*10, 88); setProgress(p); }, 350);

    try {
      const typeName = REPORT_TYPES.find(r=>r.id===selType)?.name || "General";
      const apiMessages = [
        ...messages.map(m=>({role: m.role==="agent"?"assistant":"user", content:m.content})),
        {role:"user", content:userMsg}
      ];

      // ← Llama a tu propio backend en /api/chat (no expone la API key)
      const res = await fetch("/api/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          messages: apiMessages,
          system: buildSystem(typeName),
        }),
      });

      clearInterval(timer);
      setProgress(100);

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const reply = data.content?.[0]?.text || "No se pudo generar el informe.";

      setTimeout(()=>{
        setMessages(prev=>[...prev,{role:"agent",content:reply,time:nowTime()}]);
        setLoading(false); setProgress(0);
      }, 250);

    } catch(err) {
      clearInterval(timer);
      setLoading(false); setProgress(0);
      setMessages(prev=>[...prev,{
        role:"agent",
        content:`⚠️ Error: ${err.message}. Verifica que el servidor esté corriendo y la API key esté configurada en Vercel.`,
        time:nowTime(),
      }]);
    }
  }, [loading, messages, selType]);

  const generateReport = () => {
    if (selType==="custom") { setInput("Necesito un informe sobre "); taRef.current?.focus(); return; }
    const prompts = {
      ejecutivo:"Genera el informe ejecutivo completo de CENIA con estado de todos los proyectos, KPIs financieros y principales alertas del período.",
      art22:"Genera el informe de cumplimiento del Artículo 22 Ley 19.886 para todos los contratos CENIA. Verifica los 8 requisitos y emite recomendaciones.",
      financiero:"Genera el informe financiero completo: ejecución presupuestaria por proyecto, ingresos, gastos, balance y proyección al cierre.",
      hitos:"Genera el informe de hitos y entregables: completados, en curso, retrasados y evaluación de multas según contratos.",
      proveedores:"Genera el informe de proveedores: personas naturales con retención 10%, personas jurídicas con IVA 19% y cumplimiento tributario.",
    };
    send(prompts[selType] || `Genera informe: ${selType}`);
  };

  const d = CENIA_DATA;

  return (
    <div className="shell">
      {/* TOPBAR */}
      <header className="topbar">
        <div className="brand">
          <div className="brand-hex">
            <span style={{fontSize:13,fontWeight:800,color:"#fff",fontFamily:"Syne"}}>IA</span>
          </div>
          <div>
            <div className="brand-name">CENIA Agente IA</div>
            <div className="brand-tag">GENERADOR DE INFORMES · LEY 19.886</div>
          </div>
        </div>
        <div className="topbar-r">
          <div className="model-badge">
            <div className="model-dot"/>
            claude-sonnet-4 · activo
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.4)",fontFamily:"Syne Mono",
            padding:"5px 12px",border:"1px solid rgba(255,255,255,.08)",borderRadius:20}}>
            {messages.length - 1} informes
          </div>
        </div>
      </header>

      {/* SIDEBAR */}
      <nav className="sidebar">
        <div className="nav-sec">Navegación</div>
        {[
          {id:"agente",ico:"🤖",label:"Agente Generador"},
          {id:"historial",ico:"📋",label:"Historial"},
          {id:"datos",ico:"📊",label:"Datos del Sistema"},
        ].map(item=>(
          <div key={item.id} className={`nav-item${page===item.id?" on":""}`} onClick={()=>setPage(item.id)}>
            <span className="nav-ico">{item.ico}</span>{item.label}
          </div>
        ))}
        <div className="nav-sec" style={{marginTop:8}}>Tipos de Informe</div>
        {REPORT_TYPES.map(rt=>(
          <div key={rt.id}
            className={`nav-item${selType===rt.id&&page==="agente"?" on":""}`}
            onClick={()=>{setSelType(rt.id);setPage("agente");}}>
            <span className="nav-ico">{rt.icon}</span>
            <span style={{fontSize:11.5}}>{rt.name}</span>
          </div>
        ))}
        <div className="nav-foot">
          <div className="nav-hint">Powered by Claude<br/>Art. 22 Ley 19.886<br/>CENIA Chile 2026</div>
        </div>
      </nav>

      {/* MAIN */}
      <main className="main">

        {/* AGENTE */}
        {page==="agente" && (
          <div>
            <div className="ph fu">
              <div className="ph-title">Agente Generador de Informes</div>
              <div className="ph-sub">CENTRO NACIONAL DE INTELIGENCIA ARTIFICIAL · POWERED BY CLAUDE SONNET 4</div>
              <div className="ph-actions">
                <button className="btn btn-ghost btn-sm" onClick={()=>{setMessages([{role:"agent",content:"Chat limpiado. ¿Qué informe necesitas?",time:nowTime()}]);}}>🗑 Limpiar</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>{
                  const last = [...messages].reverse().find(m=>m.role==="agent");
                  if(last){navigator.clipboard.writeText(last.content).catch(()=>{}); setToast("Copiado al portapapeles");}
                }}>📋 Copiar último informe</button>
              </div>
            </div>

            {/* Type selector */}
            <div className="rtype-grid fu">
              {REPORT_TYPES.map(rt=>(
                <div key={rt.id} className={`rtype${selType===rt.id?" on":""}`} onClick={()=>setSelType(rt.id)}>
                  {selType===rt.id
                    ? <div className="rtype-check">✓</div>
                    : rt.badge && <div className="rtype-badge">{rt.badge}</div>}
                  <div className="rtype-ico">{rt.icon}</div>
                  <div className="rtype-name">{rt.name}</div>
                  <div className="rtype-desc">{rt.desc}</div>
                </div>
              ))}
            </div>

            {/* Generate btn */}
            <div style={{display:"flex",gap:10,marginBottom:18,alignItems:"center"}} className="fu1">
              <button className="btn btn-blue" onClick={generateReport} disabled={loading}>
                {loading?"⏳ Generando…":`⚡ Generar ${REPORT_TYPES.find(r=>r.id===selType)?.name}`}
              </button>
              <span style={{fontSize:11.5,color:"var(--ink3)"}}>o escribe tu consulta abajo →</span>
            </div>

            {/* Progress */}
            {loading && (
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,color:"var(--blue)",marginBottom:4,fontFamily:"Syne Mono"}}>
                  Analizando datos y redactando… {Math.round(progress)}%
                </div>
                <div className="prog-bar"><div className="prog-fill" style={{width:`${progress}%`}}/></div>
              </div>
            )}

            {/* Chat */}
            <div className="card fu2" style={{padding:0,overflow:"hidden"}}>
              <div style={{padding:"10px 20px",background:"var(--off2)",borderBottom:"1px solid var(--border)",
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,fontWeight:700,color:"var(--ink3)",letterSpacing:".05em",textTransform:"uppercase"}}>
                  Conversación con el Agente
                </span>
                <span style={{fontSize:10,background:"var(--sky)",color:"var(--blue)",padding:"2px 8px",borderRadius:10,fontWeight:700}}>
                  {messages.length} mensajes
                </span>
              </div>
              <div ref={chatRef} style={{padding:"8px 20px",maxHeight:440,overflowY:"auto"}}>
                {messages.map((m,i)=>(
                  <div key={i} className="msg">
                    <div className={`msg-av ${m.role}`}>{m.role==="agent"?"🤖":"CG"}</div>
                    <div className="msg-body">
                      <div className="msg-meta">
                        <span className="msg-who">{m.role==="agent"?"Agente CENIA IA":"Coordinación Proyectos"}</span>
                        <span className="msg-time">{m.time}</span>
                        {m.role==="agent"&&i>0&&(

                      </div>
                      <MsgText text={m.content}/>
                    </div>
                  </div>
                ))}
                {loading && <Thinking/>}
              </div>
              <div style={{padding:"12px 20px",borderTop:"1px solid var(--border)",background:"var(--white)"}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>

                    value={input} onChange={e=>setInput(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);}}}
                    placeholder="Escribe tu consulta… (Enter envía, Shift+Enter nueva línea)"
                    disabled={loading}/>
                  <button className="btn btn-blue" onClick={()=>send(input)} disabled={loading||!input.trim()}>
                    {loading ? <span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span> : "→"}
                  </button>
                </div>
                <div className="input-hints">
                  {QUICK_PROMPTS.map((p,i)=>(
                    <span key={i} className="hint-pill" onClick={()=>send(p)}>{p}</span>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* HISTORIAL */}
        {page==="historial" && (
          <div>
            <div className="ph fu"><div className="ph-title">Historial de Informes</div><div className="ph-sub">INFORMES GENERADOS ANTERIORMENTE</div></div>
            <div className="card fu1">

          <div>

            <div className="ctx-grid fu">

                {l:"Proyectos",v:d.proyectos.length,s:`${d.proyectos.filter(p=>p.estado==="En Curso").length} en curso`},

                {l:"Hitos",v:d.hitos.length,s:`${d.hitos.filter(h=>h.estado==="Completado").length} completados`},
              ].map(k=>(
                <div key={k.l} className="ctx-item">
                  <div className="ctx-lbl">{k.l}</div>

                  {d.proyectos.map((p,i)=>(
                    <tr key={p.id}>
                      {[
                        <span style={{fontFamily:"Syne Mono",color:"var(--blue)",fontWeight:600,fontSize:11}}>{p.id}</span>,
                        p.nombre,

                        <span style={{fontFamily:"Syne Mono",fontSize:11,color:"var(--teal)"}}>{fmtCLP(p.ejecutado)}</span>,
                        <span style={{fontWeight:700,color:p.ejecutado/p.presupuesto>.9?"var(--red)":"var(--blue)"}}>{Math.round(p.ejecutado/p.presupuesto*100)}%</span>,
                        <span className={`badge badge-${p.estado==="En Curso"||p.estado==="Activo"?"ok":"warn"}`}>{p.estado}</span>,
                      ].map((v,j)=>(
                        <td key={j} style={{padding:"9px 10px",borderBottom:"1px solid var(--off2)",background:i%2===1?"var(--off2)":"var(--white)",verticalAlign:"middle"}}>{v}</td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </main>

      {toast && <Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
